name: Push approved report to Feishu

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Report date (YYYY-MM-DD); blank means yesterday in Shanghai"
        required: false
        type: string
      target_dates:
        description: "Comma-separated dates for one combined summary card (manual only)"
        required: false
        type: string
      target_week:
        description: "Weekly report target (for example 2026-W30)"
        required: false
        type: string
      delivery_target:
        description: "Destination: test by default; select formal only after Grace explicitly approves"
        required: true
        default: test
        type: choice
        options:
          - test
          - formal
      formal_approved:
        description: "Required for formal delivery after Grace's explicit approval"
        required: true
        default: false
        type: boolean
      dry_run:
        description: "Preview only; do not call Feishu"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: feishu-daily-push
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SITE_BASE_URL: https://gmx1121498738-netizen.github.io/beauty-intel
      # Existing secrets remain the test-group channel. The formal group has
      # separate credentials and is available only through manual dispatch.
      FEISHU_WEBHOOK_URL: ${{ inputs.delivery_target == 'formal' && secrets.FEISHU_FORMAL_WEBHOOK_URL || secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_WEBHOOK_SECRET: ${{ inputs.delivery_target == 'formal' && secrets.FEISHU_FORMAL_WEBHOOK_SECRET || secrets.FEISHU_WEBHOOK_SECRET }}
    steps:
      - name: Check out published reports
        uses: actions/checkout@v4

      - name: Preview a manually selected report
        if: inputs.dry_run
        run: |
          args=()
          if [[ -n "$TARGET_WEEK" ]]; then
            args+=(--week "$TARGET_WEEK")
          elif [[ -n "$TARGET_DATES" ]]; then
            args+=(--dates "$TARGET_DATES")
          elif [[ -n "$TARGET_DATE" ]]; then
            args+=(--date "$TARGET_DATE")
          fi
          python3 push_daily.py "${args[@]}" --dry-run
        env:
          TARGET_DATE: ${{ inputs.target_date }}
          TARGET_DATES: ${{ inputs.target_dates }}
          TARGET_WEEK: ${{ inputs.target_week }}

      - name: Block unapproved formal delivery
        if: inputs.delivery_target == 'formal' && !inputs.formal_approved
        run: |
          echo "Formal delivery requires Grace's explicit approval."
          exit 1

      - name: Push a manually selected report
        if: ${{ !inputs.dry_run && (inputs.delivery_target == 'test' || inputs.formal_approved) }}
        run: |
          args=()
          if [[ -n "$TARGET_WEEK" ]]; then
            args+=(--week "$TARGET_WEEK")
          elif [[ -n "$TARGET_DATES" ]]; then
            args+=(--dates "$TARGET_DATES")
          elif [[ -n "$TARGET_DATE" ]]; then
            args+=(--date "$TARGET_DATE")
          fi
          python3 push_daily.py "${args[@]}"
        env:
          TARGET_DATE: ${{ inputs.target_date }}
          TARGET_DATES: ${{ inputs.target_dates }}
          TARGET_WEEK: ${{ inputs.target_week }}
